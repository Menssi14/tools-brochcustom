  :root{ --cream:#F2EADD; --note:#FBF7F0; --green:#1F4D3E; --burgundy:#4A3424; --pink:#F4B5B0; --red:#D64545; --orange:#E8722C; --amber:#E0A82E; --go:#3C8C5A; --line:rgba(74,52,36,.14); --line-strong:rgba(74,52,36,.28); --shadow:0 1px 2px rgba(74,52,36,.10),0 2px 10px rgba(74,52,36,.06); --shadow-hover:0 4px 8px rgba(74,52,36,.13),0 10px 28px rgba(74,52,36,.12); }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{ background:var(--cream); color:var(--burgundy); font-family:'EB Garamond',Georgia,serif; font-size:17px; line-height:1.45; -webkit-font-smoothing:antialiased; min-height:100vh; }

  header{ position:sticky; top:0; z-index:40; background:var(--green); color:var(--cream); padding:13px 16px; display:flex; align-items:center; gap:12px; box-shadow:0 2px 14px rgba(31,77,62,.28); border-bottom:2px solid rgba(244,181,176,.55); }
  .wordmark{ font-family:'Schadow','Teko',sans-serif; text-transform:uppercase; font-weight:900; font-size:27px; letter-spacing:.02em; line-height:.92; color:var(--cream); white-space:nowrap; display:flex; flex-direction:column; text-decoration:none; }
  .wordmark:hover{ color:#fff; }
  .wordmark small{ font-family:'Teko',sans-serif; font-size:12px; letter-spacing:.34em; font-weight:700; color:var(--pink); margin-top:0; }
  .view-title{ font-family:'Teko',sans-serif; text-transform:uppercase; letter-spacing:.14em; font-size:20px; color:var(--pink); }
  .hbtn{ margin-left:auto; position:relative; cursor:pointer; border:none; background:rgba(242,234,221,.14); color:var(--cream); width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; transition:background .15s; }
  .hbtn:hover{ background:rgba(242,234,221,.26); }
  .hbtn .badge{ position:absolute; top:-4px; right:-4px; background:var(--pink); color:var(--green); font-family:'Teko',sans-serif; font-weight:600; font-size:13px; min-width:18px; height:18px; border-radius:9px; display:flex; align-items:center; justify-content:center; padding:0 4px; }

  .wrap{ max-width:1120px; margin:0 auto; padding:18px 12px 130px; }
  .grid{ column-gap:12px; column-width:176px; }
  .section-label{ font-family:'Teko',sans-serif; text-transform:uppercase; letter-spacing:.18em; font-size:14px; color:rgba(74,52,36,.5); font-weight:600; margin:4px 4px 12px; }

  .card{ break-inside:avoid; -webkit-column-break-inside:avoid; margin-bottom:12px; border-radius:12px; background:var(--note); border:1px solid var(--line-strong); border-top-width:5px; box-shadow:var(--shadow); overflow:hidden; cursor:pointer; transition:box-shadow .16s, transform .12s; position:relative; }
  .card:hover{ box-shadow:var(--shadow-hover); transform:translateY(-1px); } .card:active{ transform:scale(.99); }
  .card.u-asap{ border-top-color:var(--red); } .card.u-priority{ border-top-color:var(--orange); } .card.u-fcfs{ border-top-color:var(--amber); } .card.u-norush{ border-top-color:var(--go); }
  .card-imgs{ display:grid; gap:2px; } .card-imgs img{ width:100%; display:block; }
  .card-imgs.n1 img{ height:auto; max-height:230px; object-fit:cover; }
  .card-imgs.n2{ grid-template-columns:1fr 1fr; } .card-imgs.n3{ grid-template-columns:1fr 1fr 1fr; }
  .card-imgs.n2 img,.card-imgs.n3 img{ aspect-ratio:1; object-fit:cover; }
  .card-pad{ padding:11px 13px 11px; }
  .card h3{ margin:0 0 3px; font-family:'Roboto Slab',Georgia,serif; font-size:15px; font-weight:600; line-height:1.24; word-break:break-word; }
  .card .contact{ display:inline-flex; align-items:center; gap:5px; font-size:13px; color:var(--green); text-decoration:none; margin:1px 0 5px; }
  .card .ctext{ font-size:14px; line-height:1.42; white-space:pre-wrap; word-break:break-word; color:rgba(74,52,36,.92); }
  .card-block{ margin-top:8px; padding-top:8px; border-top:1px dashed var(--line); }
  .card-block .bl{ font-family:'Teko',sans-serif; text-transform:uppercase; letter-spacing:.08em; font-size:12px; color:rgba(74,52,36,.5); margin-bottom:4px; }
  .it-line{ font-size:14px; line-height:1.5; color:rgba(74,52,36,.92); display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
  .it-line b{ font-family:'Teko',sans-serif; font-weight:600; font-size:15px; color:var(--green); }
  .cdot{ width:11px; height:11px; border-radius:50%; border:1px solid rgba(74,52,36,.3); flex:none; display:inline-block; }

  .card-tags{ display:flex; flex-wrap:wrap; gap:5px; align-items:center; margin-top:9px; }
  .tag{ font-family:'Teko',sans-serif; text-transform:uppercase; letter-spacing:.04em; font-size:13px; font-weight:500; line-height:1; padding:3px 8px 2px; border-radius:6px; background:rgba(74,52,36,.08); color:var(--burgundy); display:flex; align-items:center; gap:5px; }
  .tag .dot{ width:8px; height:8px; border-radius:50%; }
  .tag.qty{ background:rgba(31,77,62,.10); color:var(--green); }
  .tag.due{ background:rgba(214,69,69,.13); color:#a33; } .tag.due.overdue{ background:var(--red); color:#fff; }
  .tag.online{ background:rgba(244,181,176,.32); color:var(--burgundy); }
  .tag.countdown{ background:rgba(74,52,36,.10); color:rgba(74,52,36,.7); }

  .card-bar{ display:flex; align-items:center; gap:2px; padding:4px 6px; border-top:1px solid var(--line); opacity:0; transition:opacity .15s; }
  .card:hover .card-bar{ opacity:1; } @media(hover:none){ .card-bar{ opacity:1; } }
  .card-bar .done-btn{ display:flex; align-items:center; gap:6px; cursor:pointer; border:none; background:none; font-family:'Teko',sans-serif; text-transform:uppercase; letter-spacing:.05em; font-size:14px; color:var(--green); padding:5px 8px; border-radius:7px; }

    var lab=document.createElement('div'); lab.className='uslider-label';
    function place(){ var i=order.indexOf(editing.urgency); if(i<0)i=1; knob.style.left=((i+0.5)*(100/order.length))+'%'; var u=URGENCY[order[i]]; knob.style.background=u.color; lab.textContent=u.label; lab.style.color=u.color; var segs=track.querySelectorAll('.useg'); for(var j=0;j<segs.length;j++){ segs[j].classList.toggle('on', j===i); } }
    order.forEach(function(k,ix){ var u=URGENCY[k]; var seg=document.createElement('div'); seg.className='useg '+u.cls+(ix===0?' first':'')+(ix===order.length-1?' last':''); seg.title=u.label; seg.onclick=function(){ editing.urgency=k; place(); livePersist(); }; track.appendChild(seg); });
    track.appendChild(knob);
    c.appendChild(track); c.appendChild(lab);
    place();
  }


  function renderImgs(){
    var c=$('mImgs'); c.innerHTML=''; var imgs=editing.images||[];
    imgs.forEach(function(uu,i){ var d=document.createElement('div'); d.className='imthumb'; d.innerHTML='<img src="'+uu+'"><span class="x">&times;</span>'; d.querySelector('.x').onclick=function(){ editing.images.splice(i,1); renderImgs(); livePersist(); }; c.appendChild(d); });
    if(imgs.length<3){ var add=document.createElement('div'); add.className='addimg'; add.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Photo'; add.onclick=function(){ $('fileInput').click(); }; c.appendChild(add); }
  }

  function renderBody(){
    buildMetaControls();
    var c=$('mBody'); c.innerHTML='';
    if(editing.type==='NOTE'){
      var ta=document.createElement('textarea'); ta.className='note-body'; ta.placeholder='Write your note…'; ta.value=editing.body||''; ta.oninput=function(e){editing.body=e.target.value;autoGrow(e.target,130);livePersist();}; c.appendChild(ta); setTimeout(function(){autoGrow(ta,130);},0);
      return;
    }
    // optional notes (placed below the items)
    var nt=document.createElement('textarea'); nt.className='notes-body'; nt.placeholder='Notes (optional)…'; nt.value=editing.body||''; nt.oninput=function(e){editing.body=e.target.value;autoGrow(e.target,66);livePersist();}; nt.style.marginTop='6px';
    // variant builder
    var bld=document.createElement('div'); bld.className='builder';
    var isEng=(editing.type==='Engraving');
    // Each field gets: the input (type if you want) + a side-scrolling row of tappable chips
    function fieldWithChips(cls, listId, ph, getV, setV){
      var wrap=document.createElement('div'); wrap.className='b-field';
      var inp=document.createElement('input'); inp.className=cls; inp.setAttribute('list',listId); inp.setAttribute('autocomplete','off'); inp.placeholder=ph; inp.value=getV();
      inp.oninput=function(e){ setV(e.target.value); syncChips(); };
      wrap.appendChild(inp);
      var strip=document.createElement('div'); strip.className='chip-strip';
      var dl=document.getElementById(listId);
      var opts = dl ? Array.prototype.map.call(dl.querySelectorAll('option'), function(o){ return o.value||o.textContent; }) : [];
      function syncChips(){ strip.querySelectorAll('.vchip').forEach(function(ch){ ch.classList.toggle('on', ch.dataset.val===getV()); }); }
      opts.forEach(function(val){
        var ch=document.createElement('button'); ch.type='button'; ch.className='vchip'+(getV()===val?' on':''); ch.dataset.val=val; ch.textContent=val;
        ch.onclick=function(){ var was=(getV()===val); setV(was?'':val); inp.value=was?'':val; syncChips(); };
        strip.appendChild(ch);
      });
      wrap.appendChild(strip);
      return wrap;
    }
    // Multi-select version: value is a comma-joined string, several chips can be ON
    function multiChipsField(listId, ph, getV, setV){
      var wrap=document.createElement('div'); wrap.className='b-field';
      var inp=document.createElement('input'); inp.className='b-inp'; inp.setAttribute('list',listId); inp.setAttribute('autocomplete','off'); inp.placeholder=ph; inp.value=getV();
      function selected(){ return (getV()||'').split(',').map(function(s){return s.trim();}).filter(Boolean); }
      inp.oninput=function(e){ setV(e.target.value); syncChips(); };
      wrap.appendChild(inp);
      var strip=document.createElement('div'); strip.className='chip-strip';
      var dl=document.getElementById(listId);
      var opts = dl ? Array.prototype.map.call(dl.querySelectorAll('option'), function(o){ return o.value||o.textContent; }) : [];
      function syncChips(){ var sel=selected(); strip.querySelectorAll('.vchip').forEach(function(ch){ ch.classList.toggle('on', sel.indexOf(ch.dataset.val)>=0); }); }
      opts.forEach(function(val){
        var ch=document.createElement('button'); ch.type='button'; ch.className='vchip'; ch.dataset.val=val; ch.textContent=val;
        ch.onclick=function(){
          var sel=selected(); var idx=sel.indexOf(val);
          if(idx>=0) sel.splice(idx,1); else sel.push(val);
          setV(sel.join(', ')); inp.value=sel.join(', '); syncChips();
        };
        strip.appendChild(ch);
      });
      syncChips();
      wrap.appendChild(strip);
      return wrap;
    }
    if(!isEng){ bld.appendChild(fieldWithChips('b-inp','sizeList','Size',function(){return builder.size;},function(v){builder.size=v;})); }
    var placeSlot=null;
    function placementListId(){ return /cap|beanie|hat|visor/i.test(builder.surface||'') ? 'capPlaceList' : 'placeList'; }
    function rebuildPlacement(){
      if(isEng || !placeSlot) return;
      var want=placementListId();
      if(placeSlot.dataset.list===want) return;
      builder.placement='';
      var fresh=multiChipsField(want,'Placement (pick any)',function(){return builder.placement;},function(v){builder.placement=v;});
      fresh.dataset.list=want;
      placeSlot.replaceWith(fresh); placeSlot=fresh;
    }
    bld.appendChild(fieldWithChips('b-inp', isEng?'engSurfList':'surfList', isEng?'Item':'Garment', function(){return builder.surface;}, function(v){builder.surface=v; rebuildPlacement();}));
    bld.appendChild(fieldWithChips('b-inp', isEng?'engMatList':'matList', 'Material', function(){return builder.material;}, function(v){builder.material=v;}));
    if(!isEng){ placeSlot=multiChipsField(placementListId(),'Placement (pick any)',function(){return builder.placement;},function(v){builder.placement=v;}); placeSlot.dataset.list=placementListId(); bld.appendChild(placeSlot); }
    bld.appendChild(colorStrip(function(){return builder.color;}, function(cc){builder.color=cc;}));
    var qa=document.createElement('div'); qa.className='qty-add';
    var step=document.createElement('div'); step.className='stepper';
    var minus=document.createElement('button'); minus.type='button'; minus.textContent='\u2212';
    var qv=document.createElement('span'); qv.className='qv'; qv.textContent=builder.qty;
    var plus=document.createElement('button'); plus.type='button'; plus.textContent='+';
    var addB=document.createElement('button'); addB.type='button'; addB.className='add-batch'; addB.textContent='Add '+builder.qty;
    minus.onclick=function(){ builder.qty=Math.max(1,builder.qty-1); qv.textContent=builder.qty; addB.textContent='Add '+builder.qty; };
    plus.onclick=function(){ builder.qty=builder.qty+1; qv.textContent=builder.qty; addB.textContent='Add '+builder.qty; };
    step.appendChild(minus); step.appendChild(qv); step.appendChild(plus);
    qa.appendChild(step); qa.appendChild(addB); bld.appendChild(qa);
    var list=document.createElement('div'); fillGen(list); c.appendChild(list);
    c.appendChild(nt); setTimeout(function(){autoGrow(nt,66);},0);
    var albl=document.createElement('div'); albl.className='desc-label'; albl.textContent='Add item'; c.appendChild(albl);
    c.appendChild(bld);
    addB.onclick=function(){ var n=Math.max(1,builder.qty||1); for(var i=0;i<n;i++)editing.items.push({size:builder.size,color:builder.color,surface:builder.surface,material:builder.material,placement:builder.placement,name:''}); fillGen(list); livePersist(); toast('Added '+n+(n>1?' items':' item')); };
  }

  function colorStrip(getC,setC){
    var crow=document.createElement('div'); crow.className='it-color-row';
    var nm=document.createElement('span'); nm.className='it-color-name'; nm.textContent=getC()||'Color'; crow.appendChild(nm);
    var strip=document.createElement('div'); strip.className='it-swatches';
    COLORS.forEach(function(col){ var s=document.createElement('span'); s.className='sw'+(getC()===col.n?' sel':''); s.style.background=col.h; s.title=col.n; s.onclick=function(){ var was=(getC()===col.n); strip.querySelectorAll('.sw').forEach(function(x){x.classList.remove('sel');}); if(was){ setC(''); nm.textContent='Color'; } else { setC(col.n); nm.textContent=col.n; s.classList.add('sel'); } }; strip.appendChild(s); });
    crow.appendChild(strip); return crow;
  }
  function showNameInput(row, it, container){
    // remove the +name button / chip, drop in an input
    var old=row.querySelector('.g-addname')||row.querySelector('.g-name-chip'); if(old)old.remove();
    var nm=document.createElement('input'); nm.className='g-name'; nm.placeholder='Name (optional)'; nm.value=it.name||'';
    nm.oninput=function(e){ it.name=e.target.value; livePersist(); };
    nm.onblur=function(){ fillGen(container); };
    nm.onkeydown=function(e){ if(e.key==='Enter'){ e.preventDefault(); nm.blur(); } };
    var rm=row.querySelector('.g-rm'); row.insertBefore(nm, rm);
    setTimeout(function(){ nm.focus(); }, 30);
  }
  function fillGen(container){
    container.innerHTML='';
    if(!editing.items.length){ var e=document.createElement('div'); e.className='gen-empty'; e.textContent='No items yet — add one below.'; container.appendChild(e); return; }
    editing.items.forEach(function(it,i){
      var row=document.createElement('div'); row.className='gitem';
      var idx=document.createElement('span'); idx.className='g-idx'; idx.textContent=(i+1); row.appendChild(idx);
      var dot=document.createElement('span'); dot.className='cdot'; if(it.color){dot.style.background=colorHex(it.color);}else{dot.style.background='transparent';dot.style.borderStyle='dashed';} row.appendChild(dot);
      var sum=document.createElement('span'); sum.className='g-sum'; sum.textContent=comboText(it); row.appendChild(sum);
      var rm=document.createElement('span'); rm.className='g-rm'; rm.innerHTML='&times;'; rm.onclick=function(){editing.items.splice(i,1);fillGen(container);livePersist();};
      if(it.name && it.name.trim()){
        var chip=document.createElement('span'); chip.className='g-name-chip';
        chip.innerHTML='<span>'+esc(it.name)+'</span><span class="edit">edit</span>';
        chip.querySelector('.edit').onclick=function(){ showNameInput(row, it, container); };
        row.appendChild(chip);
      } else if(it._editingName){
        // handled by showNameInput below on demand
      } else {
        var addn=document.createElement('button'); addn.type='button'; addn.className='g-addname'; addn.textContent='+ name';
        addn.onclick=function(){ showNameInput(row, it, container); };
        row.appendChild(addn);
      }
      row.appendChild(rm);
      container.appendChild(row);
    });
  }

  $('mTitle').addEventListener('input',function(e){editing.title=e.target.value;livePersist();});
  $('drSwitch').addEventListener('click',function(){ if(!editing)return; editing.designReady=!editing.designReady; $('drSwitch').classList.toggle('on',editing.designReady); livePersist(); });

  function buildBar(o){
    var bar=$('mBar'); bar.innerHTML='';
    if(o.isNew){ var dc=document.createElement('button'); dc.className='m-ghost'; dc.textContent='Discard'; dc.onclick=discard; bar.appendChild(dc); var sv=document.createElement('button'); sv.className='m-close spacer'; sv.textContent='Save'; sv.onclick=commitOrClose; bar.appendChild(sv); }
    else if(o.trashed){ var fv=document.createElement('button'); fv.className='m-forever'; fv.textContent='Delete forever'; fv.onclick=function(){var id=o.id;hideOverlay();forever(id);}; bar.appendChild(fv); var rs=document.createElement('button'); rs.className='m-restore spacer'; rs.textContent='Restore'; rs.onclick=function(){var id=o.id;hideOverlay();restore(id);}; bar.appendChild(rs); }
    else { var tr=document.createElement('button'); tr.className='m-delete'; tr.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>Delete'; tr.onclick=function(){var id=o.id;hideOverlay();toTrash(id,'deleted');}; bar.appendChild(tr); var dn=document.createElement('button'); dn.className='m-done spacer'; dn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4"><path d="M5 12l5 5L20 6"/></svg>Mark done'; dn.onclick=function(){var id=o.id;hideOverlay();toTrash(id,'done');}; bar.appendChild(dn); var cl=document.createElement('button'); cl.className='m-close'; cl.textContent='Close'; cl.onclick=commitOrClose; bar.appendChild(cl); }
  }
  function hideOverlay(){ overlay.classList.remove('show'); editing=null; }
  function discard(){ hideOverlay(); render(); }
  function commitOrClose(){
    if(!editing){ overlay.classList.remove('show'); return; }
    editing.items=(editing.items||[]).filter(itemHas);
    if(editing.isNew){
      var hasText=(editing.title||'').trim()||(editing.body||'').trim()||(editing.images&&editing.images.length)||editing.items.length||editing.due;
      if(!hasText){ discard(); return; }
      delete editing.isNew; editing.updatedAt=Date.now(); state.orders.unshift(editing); hideOverlay(); persist(); render(); return;
    }
    editing.updatedAt=Date.now(); hideOverlay(); render();
  }
  overlay.addEventListener('click',commitOrClose);
  function autoGrow(el,min){ el.style.height='auto'; el.style.height=Math.max(min||40,el.scrollHeight)+'px'; }

  $('fileInput').addEventListener('change',function(e){ var files=Array.prototype.slice.call(e.target.files); if(!files.length||!editing)return; if(!editing.images)editing.images=[]; var slots=3-editing.images.length; if(slots<=0){toast('Up to 3 photos');e.target.value='';return;} files=files.slice(0,slots); var pending=files.length; files.forEach(function(f){ processImage(f,function(url){ if(url)editing.images.push(url); pending--; if(pending===0){ renderImgs(); livePersist(); } }); }); e.target.value=''; });

  window.addEventListener('message',function(e){ var d=e.data; if(!d||typeof d!=='object')return; if(d.type==='BROCH_ORDER'&&d.order)ingest(d.order); else if(d.type==='BROCH_DESIGN'&&d.image)ingest({image:d.image,title:d.title||'',body:d.body||''}); });
  try{ if(window.parent&&window.parent!==window)window.parent.postMessage({type:'BROCH_ORDERS_READY'},'*'); }catch(_){}
  function ingest(src){
    var type=src.type||(Array.isArray(src.types)&&src.types[0])||'NOTE'; if(type==='Print')type='Printing'; if(type==='N/A')type='NOTE'; if(TYPES.indexOf(type)<0)type='NOTE';
    var images=[]; if(src.image)images.push(src.image); if(Array.isArray(src.images))src.images.forEach(function(uu){if(images.length<3)images.push(uu);}); images=images.slice(0,3);
    var dueP=src.duePreset||''; var due=src.due||(dueP?computeDue(dueP):'');
    var o={ id:uid(),type:type,title:src.title||src.customer||'',contact:src.contact||src.phone||'',body:src.body||src.details||src.notes||'',urgency:src.urgency||'asap',designReady:!!src.designReady,items:Array.isArray(src.items)?src.items:[],images:images,due:due,duePreset:dueP,trashed:false,trashedAt:null,source:'online',createdAt:Date.now(),updatedAt:Date.now() };
    state.orders.unshift(o);
    if(ui.view==='trash')ui.view='board'; render(); persist(); toast('New online order'+(src.title?' — '+src.title:''));
  }
  function checkHash(){ if(location.hash.indexOf('#order=')===0){ try{ ingest(JSON.parse(decodeURIComponent(location.hash.slice(7)))); history.replaceState(null,'',location.pathname+location.search); }catch(_){}} }

  document.addEventListener('keydown',function(e){ if(e.key!=='Escape')return; if(chooser.classList.contains('show')){chooser.classList.remove('show');return;} if(overlay.classList.contains('show')){ if(editing&&editing.isNew)discard(); else commitOrClose(); } });

  // ── Payment history (hidden icon → overlay) ──────────────
  var _histLoaded=false;
  function openHist(){
    $('histOverlay').classList.add('show');
    if(!_histLoaded){ loadHist(); }
  }
  function closeHist(){ $('histOverlay').classList.remove('show'); }
  $('histBtn').addEventListener('click',openHist);
  $('histClose').addEventListener('click',closeHist);
  $('histOverlay').addEventListener('click',function(e){ if(e.target===$('histOverlay'))closeHist(); });

  function money(cents){ return '$'+(cents/100).toFixed(2); }
  function whenText(iso){
    try{ var d=new Date(iso); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' · '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}); }
    catch(e){ return ''; }
  }
  function loadHist(){
    $('histList').innerHTML='<div class="hist-loading">Loading payments…</div>';
    $('histSum').innerHTML=''; $('histFoot').textContent='';
    fetch('/api/payments').then(function(r){return r.json();}).then(function(d){
      if(!d.ok){ $('histList').innerHTML='<div class="hist-loading">'+esc(d.error||'Could not load payments.')+'</div>'; return; }
      _histLoaded=true;
      var pays=(d.payments||[]).filter(function(p){return p.status==='COMPLETED';});
      if(!pays.length){ $('histList').innerHTML='<div class="hist-loading">No payments in the last 90 days.</div>'; return; }
      var total=pays.reduce(function(s,p){return s+(p.amount||0);},0);
      // this month
      var now=new Date(), mStart=new Date(now.getFullYear(),now.getMonth(),1).getTime();
      var monthPays=pays.filter(function(p){return new Date(p.createdAt).getTime()>=mStart;});
      var monthTotal=monthPays.reduce(function(s,p){return s+(p.amount||0);},0);
      $('histSum').innerHTML=
        '<div class="hist-stat"><div class="n">'+money(monthTotal)+'</div><div class="l">This month</div></div>'+
        '<div class="hist-stat"><div class="n">'+monthPays.length+'</div><div class="l">Orders this month</div></div>'+
        '<div class="hist-stat"><div class="n">'+money(total)+'</div><div class="l">Last 90 days</div></div>';
      $('histList').innerHTML=pays.map(function(p){
        var who=[]; if(p.cardBrand)who.push(p.cardBrand+(p.last4?' ····'+p.last4:'')); if(p.email)who.push(p.email);
        return '<div class="hist-row">'+
          '<div class="hist-amt">'+money(p.amount)+'</div>'+
          '<div class="hist-mid"><div class="hist-when">'+whenText(p.createdAt)+'</div>'+
          (who.length?'<div class="hist-who">'+esc(who.join(' · '))+'</div>':'')+'</div>'+
          (p.receipt?'<span class="hist-badge">#'+esc(p.receipt)+'</span>':'')+
        '</div>';
      }).join('');
      $('histFoot').textContent='Showing completed payments · last 90 days';
    }).catch(function(){
      $('histList').innerHTML='<div class="hist-loading">Could not reach the payment service.</div>';
    });
  }

  var lb=$('lightbox'), lbi=$('lightboxImg');
  function openLightbox(src){ lbi.src=src; lb.classList.add('show'); }
  lb.addEventListener('click',function(){ lb.classList.remove('show'); lbi.src=''; });
  document.addEventListener('click',function(e){
    var t=e.target;
    if(t && t.tagName==='IMG' && (t.closest('.card-imgs') || t.closest('.imthumb'))){
      e.stopPropagation(); e.preventDefault(); openLightbox(t.src);
    }
  }, true);

  load(); checkHash();
})();
</script>
</body>
</html>
