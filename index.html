<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>File Sharing — BrochCustom</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Teko:wght@300;400;500;600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --green: #1e5c2a;
      --green-light: #2d7a3a;
      --green-bright: #3a9e4a;
      --green-dim: rgba(30,92,42,0.15);
      --mono: 'DM Mono', monospace;
      --serif: 'Cormorant Garamond', serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===================== DESKTOP ===================== */
    header {
      width: 100%;
      max-width: 900px;
      padding: 2.5rem 2rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header img { width: 48px; height: 48px; object-fit: contain; }
    header h1 { font-family: 'Teko', sans-serif; font-weight: 400; font-size: 2.2rem; letter-spacing: 0.1em; color: var(--white); line-height: 1; }
    header span { font-family: var(--mono); font-size: 0.65rem; color: var(--green-light); letter-spacing: 0.2em; text-transform: uppercase; display: block; margin-top: 2px; }

    .divider { width: 100%; max-width: 900px; height: 1px; background: linear-gradient(90deg, transparent, var(--green), transparent); margin-bottom: 2.5rem; }

    main { width: 100%; max-width: 900px; padding: 0 2rem 4rem; display: flex; flex-direction: column; gap: 2.5rem; flex: 1; }

    .upload-zone {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 3rem 2rem;
      text-align: center;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.02);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .upload-zone.dragging { border-color: var(--green-light); background: var(--green-dim); }
    .upload-icon { font-size: 2.5rem; opacity: 0.6; }
    .upload-zone h2 { font-family: var(--serif); font-weight: 300; font-size: 1.4rem; letter-spacing: 0.05em; }
    .upload-zone p { font-size: 0.7rem; color: rgba(255,255,255,0.4); letter-spacing: 0.15em; text-transform: uppercase; }

    .btn-upload {
      margin-top: 1rem;
      padding: 0.6rem 2rem;
      border: 1px solid var(--green);
      color: var(--green-light);
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      transition: all 0.25s ease;
      border-radius: 2px;
    }
    .btn-upload:hover { background: var(--green); color: var(--white); }

    .progress-wrap { display: none; width: 100%; margin-top: 1rem; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--green-light); width: 0%; transition: width 0.3s ease; }
    #status { font-size: 0.68rem; color: var(--green-light); letter-spacing: 0.15em; text-align: center; min-height: 1.2em; }

    .files-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .files-header h3 { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    .files-header span { font-size: 0.65rem; color: var(--green-light); }
    .file-list { display: flex; flex-direction: column; gap: 0.6rem; }

    .file-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 1.2rem;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 3px;
      background: rgba(255,255,255,0.02);
      transition: all 0.2s ease;
    }
    .file-item:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }
    .file-icon { font-size: 1.2rem; opacity: 0.7; flex-shrink: 0; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: 0.62rem; color: rgba(255,255,255,0.3); margin-top: 2px; }
    .file-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

    .btn-action {
      padding: 0.3rem 0.8rem;
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid;
    }
    .btn-dl { border-color: var(--green); color: var(--green-light); background: transparent; }
    .btn-dl:hover { background: var(--green); color: var(--white); }
    .btn-del { border-color: rgba(255,80,80,0.3); color: rgba(255,100,100,0.6); background: transparent; }
    .btn-del:hover { background: rgba(255,50,50,0.15); border-color: rgba(255,80,80,0.6); color: rgba(255,120,120,1); }
    .btn-share { border-color: rgba(100,160,255,0.35); color: rgba(120,175,255,0.7); background: transparent; }
    .btn-share:hover { background: rgba(100,160,255,0.12); border-color: rgba(100,160,255,0.6); color: rgba(150,200,255,1); }
    .btn-share:disabled { opacity: 0.4; cursor: default; }

    /* ── NEW: Copy Link button ── */
    .btn-copy { border-color: rgba(80,200,180,0.4); color: rgba(100,220,200,0.8); background: transparent; }
    .btn-copy:hover { background: rgba(80,200,180,0.12); border-color: rgba(80,200,180,0.7); color: rgba(140,240,220,1); }
    .btn-copy.copied { border-color: var(--green-bright); color: var(--green-bright); }

    /* ── NEW: Preview button ── */
    .btn-preview { border-color: rgba(255,200,80,0.38); color: rgba(255,215,100,0.78); background: transparent; }
    .btn-preview:hover { background: rgba(255,200,80,0.1); border-color: rgba(255,200,80,0.65); color: rgba(255,225,130,1); }

    .empty { text-align: center; padding: 3rem; color: rgba(255,255,255,0.2); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; border: 1px dashed rgba(255,255,255,0.06); border-radius: 3px; }

    /* ===================== PREVIEW MODAL ===================== */
    .preview-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .preview-overlay.open { display: flex; }
    .preview-box {
      background: #111;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      width: 100%;
      max-width: 720px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.3rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
      gap: 1rem;
    }
    .preview-title-row { display: flex; align-items: center; gap: 0.6rem; min-width: 0; overflow: hidden; }
    .preview-file-icon { font-size: 1rem; flex-shrink: 0; }
    .preview-file-name { font-size: 0.78rem; letter-spacing: 0.05em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preview-close {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      font-size: 1rem;
      cursor: pointer;
      padding: 0.25rem 0.6rem;
      line-height: 1;
      flex-shrink: 0;
      border-radius: 2px;
      font-family: var(--mono);
      transition: all 0.2s;
    }
    .preview-close:hover { color: var(--white); border-color: rgba(255,255,255,0.3); }
    .preview-body {
      overflow: auto;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .preview-body img { max-width: 100%; max-height: 65vh; object-fit: contain; border-radius: 4px; }
    .preview-body iframe { width: 100%; height: 65vh; border: none; background: white; }
    .preview-body pre {
      width: 100%;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: rgba(255,255,255,0.78);
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.65;
      max-height: 65vh;
      overflow: auto;
      align-self: flex-start;
    }
    .no-preview { text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.3); letter-spacing: 0.15em; text-transform: uppercase; }
    .no-preview .big-icon { font-size: 3.5rem; display: block; margin-bottom: 1rem; opacity: 0.45; }
    .preview-loading { font-size: 0.7rem; color: var(--green-light); letter-spacing: 0.2em; text-transform: uppercase; animation: pulse 1.4s ease infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

    /* ===================== SHARED CLIPBOARD ===================== */
    .clipboard-section {
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 1.5rem;
      background: rgba(255,255,255,0.02);
    }
    .clipboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 1rem;
    }
    .clipboard-header-left { display: flex; align-items: center; gap: 0.7rem; }
    .clipboard-header h3 { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    .clipboard-badge {
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(100,220,200,0.6);
      border: 1px solid rgba(100,220,200,0.25);
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
    }
    .clipboard-status { font-size: 0.62rem; color: var(--green-light); letter-spacing: 0.1em; min-height: 1em; flex-shrink: 0; }
    .clipboard-textarea {
      width: 100%;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 3px;
      color: var(--white);
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.65;
      padding: 0.85rem 1rem;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .clipboard-textarea:focus { border-color: rgba(30,92,42,0.55); }
    .clipboard-textarea::placeholder { color: rgba(255,255,255,0.18); }
    .clipboard-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; justify-content: flex-end; }
    .btn-clip {
      padding: 0.35rem 1rem;
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid;
    }
    .btn-clip-copy { border-color: rgba(80,200,180,0.4); color: rgba(100,220,200,0.8); background: transparent; }
    .btn-clip-copy:hover { background: rgba(80,200,180,0.12); border-color: rgba(80,200,180,0.7); color: rgba(140,240,220,1); }
    .btn-clip-save { border-color: var(--green); color: var(--green-light); background: transparent; }
    .btn-clip-save:hover { background: var(--green); color: var(--white); }
    .btn-clip-clear { border-color: rgba(255,80,80,0.25); color: rgba(255,100,100,0.5); background: transparent; }
    .btn-clip-clear:hover { background: rgba(255,50,50,0.1); border-color: rgba(255,80,80,0.5); color: rgba(255,120,120,0.9); }

    footer { padding: 1.5rem; font-size: 0.6rem; color: rgba(255,255,255,0.15); letter-spacing: 0.2em; text-align: center; }
    footer a { color: var(--green-light); text-decoration: none; }

    /* ===================== MOBILE APP LAYOUT ===================== */
    @media (max-width: 768px) {

      body { background: #050505; }

      header {
        padding: 1rem 1.2rem;
        background: rgba(255,255,255,0.03);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        max-width: 100%;
        gap: 0.8rem;
      }
      header img { width: 32px; height: 32px; }
      header h1 { font-size: 1.6rem; }
      header span { font-size: 0.55rem; }

      .divider { display: none; }

      main {
        padding: 1.2rem;
        gap: 1.2rem;
        width: 100%;
        max-width: 100%;
      }

      .upload-zone {
        border-radius: 20px;
        border: 2px dashed rgba(30,92,42,0.5);
        background: rgba(30,92,42,0.06);
        padding: 3rem 2rem;
        gap: 1rem;
        min-height: 280px;
      }
      .upload-zone.dragging { border-color: var(--green-bright); background: rgba(30,92,42,0.15); }
      .upload-icon {
        font-size: 4rem; opacity: 0.8;
        background: rgba(30,92,42,0.15);
        width: 90px; height: 90px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 50%; margin-bottom: 0.5rem;
      }
      .upload-zone h2 { font-family: 'Teko', sans-serif; font-size: 2rem; letter-spacing: 0.08em; font-weight: 400; }
      .upload-zone p { font-size: 0.65rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.3); }
      .btn-upload { width: 100%; padding: 1.1rem; font-size: 0.85rem; letter-spacing: 0.2em; border-radius: 12px; border: none; background: var(--green); color: var(--white); margin-top: 0.5rem; }
      .btn-upload:hover { background: var(--green-bright); }
      .progress-wrap { border-radius: 4px; height: 3px; margin-top: 0.8rem; }

      .files-header { margin-bottom: 0.8rem; }
      .files-header h3 { font-size: 0.6rem; }

      .file-item {
        border-radius: 14px;
        padding: 1rem 1.1rem;
        flex-wrap: wrap;
        gap: 0.8rem;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.03);
      }
      .file-icon {
        font-size: 1.8rem;
        background: rgba(255,255,255,0.05);
        width: 46px; height: 46px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 10px; flex-shrink: 0;
      }
      .file-info { flex: 1; min-width: 0; }
      .file-name { font-size: 0.82rem; }
      .file-meta { font-size: 0.65rem; margin-top: 3px; }

      /* Mobile buttons: wrap into 2 rows of 3+2 */
      .file-actions { width: 100%; gap: 0.5rem; flex-wrap: wrap; }
      .btn-action {
        flex: 1 1 calc(33.33% - 0.4rem);
        min-width: 70px;
        text-align: center;
        padding: 0.7rem 0.4rem;
        font-size: 0.65rem;
        border-radius: 10px;
      }
      .btn-dl { background: rgba(30,92,42,0.15); border-color: var(--green); }
      .btn-del { background: rgba(255,50,50,0.05); }
      .btn-share { background: rgba(100,160,255,0.07); border-color: rgba(100,160,255,0.35); color: rgba(120,175,255,0.8); }
      .btn-copy { background: rgba(80,200,180,0.06); border-color: rgba(80,200,180,0.35); }
      .btn-preview { background: rgba(255,200,80,0.06); border-color: rgba(255,200,80,0.32); }

      .empty { border-radius: 14px; padding: 2.5rem 1rem; font-size: 0.65rem; }

      /* Preview modal on mobile */
      .preview-overlay { padding: 0.8rem; align-items: flex-end; }
      .preview-box { border-radius: 18px; max-height: 90vh; }
      .preview-header { padding: 1rem 1.1rem; }
      .preview-file-name { font-size: 0.75rem; }
      .preview-body { padding: 1rem; }

      /* Clipboard on mobile */
      .clipboard-section { border-radius: 14px; padding: 1.1rem; }
      .clipboard-textarea { font-size: 0.82rem; min-height: 100px; border-radius: 10px; }
      .clipboard-actions { gap: 0.5rem; }
      .btn-clip {
        flex: 1;
        text-align: center;
        padding: 0.75rem 0.4rem;
        font-size: 0.68rem;
        border-radius: 10px;
      }

      footer { font-size: 0.65rem; padding: 1.2rem; }
    }
  </style>
</head>
<body>

  <header>
    <img src="Website.png" alt="BrochCustom Logo" />
    <div>
      <h1>File Sharing</h1>
      <span>by BrochCustom</span>
    </div>
  </header>

  <div class="divider"></div>

  <main>
    <div class="upload-zone" id="dropZone">
      <span class="upload-icon">⬆</span>
      <h2>Drop files here</h2>
      <p>browse your device or paste with Ctrl+V</p>
      <button class="btn-upload" id="selectBtn">Select Files</button>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div id="status"></div>
    </div>

    <div>
      <div class="files-header">
        <h3>Stored Files</h3>
        <span id="fileCount">0 files</span>
      </div>
      <div class="file-list" id="fileList">
        <div class="empty">No files uploaded yet</div>
      </div>
    </div>

    <!-- ── SHARED CLIPBOARD ── -->
    <div class="clipboard-section">
      <div class="clipboard-header">
        <div class="clipboard-header-left">
          <h3>Shared Clipboard</h3>
          <span class="clipboard-badge">Synced</span>
        </div>
        <span class="clipboard-status" id="clipboardStatus"></span>
      </div>
      <textarea
        class="clipboard-textarea"
        id="clipboardArea"
        placeholder="Paste or type any text here — it syncs automatically across all devices..."
        spellcheck="false"
      ></textarea>
      <div class="clipboard-actions">
        <button class="btn-clip btn-clip-clear" id="clipClearBtn">Clear</button>
        <button class="btn-clip btn-clip-copy" id="clipCopyBtn">Copy All</button>
        <button class="btn-clip btn-clip-save" id="clipSaveBtn">Save Now</button>
      </div>
    </div>
  </main>

  <input type="file" id="fileInput" multiple style="display:none" />

  <!-- ── PREVIEW MODAL ── -->
  <div class="preview-overlay" id="previewOverlay">
    <div class="preview-box">
      <div class="preview-header">
        <div class="preview-title-row">
          <span class="preview-file-icon" id="previewIcon">📁</span>
          <span class="preview-file-name" id="previewTitle"></span>
        </div>
        <button class="preview-close" id="previewClose">✕ Close</button>
      </div>
      <div class="preview-body" id="previewBody">
        <div class="preview-loading">Loading…</div>
      </div>
    </div>
  </div>

  <footer><a href="https://brochcustom.com/" target="_blank">← Main Page</a></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {

      var SUPABASE_URL = 'https://ixuxzdaevbytnznxmtal.supabase.co';
      var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4dXh6ZGFldmJ5dG56bnhtdGFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NzIyNjMsImV4cCI6MjA5MjA0ODI2M30.9FxQ47kbShuIehy2aqRkG11fewLjHxX1RvoPtCYPTIE';
      var BUCKET = 'files';
      var CLIPBOARD_KEY = '_shared_clipboard';
      var client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      /* ── DOM references ── */
      var dropZone      = document.getElementById('dropZone');
      var fileInput     = document.getElementById('fileInput');
      var selectBtn     = document.getElementById('selectBtn');
      var fileList      = document.getElementById('fileList');
      var fileCount     = document.getElementById('fileCount');
      var progressWrap  = document.getElementById('progressWrap');
      var progressBar   = document.getElementById('progressBar');
      var status        = document.getElementById('status');

      var previewOverlay = document.getElementById('previewOverlay');
      var previewTitle   = document.getElementById('previewTitle');
      var previewIcon    = document.getElementById('previewIcon');
      var previewBody    = document.getElementById('previewBody');
      var previewClose   = document.getElementById('previewClose');

      var clipboardArea   = document.getElementById('clipboardArea');
      var clipboardStatus = document.getElementById('clipboardStatus');
      var clipSaveBtn     = document.getElementById('clipSaveBtn');
      var clipCopyBtn     = document.getElementById('clipCopyBtn');
      var clipClearBtn    = document.getElementById('clipClearBtn');

      /* ── Upload ── */
      selectBtn.addEventListener('click', function(e) { e.stopPropagation(); fileInput.click(); });
      fileInput.addEventListener('change', function(e) { handleFiles(e.target.files); fileInput.value = ''; });
      dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragging'); });
      dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragging'); });
      dropZone.addEventListener('drop', function(e) { e.preventDefault(); dropZone.classList.remove('dragging'); handleFiles(e.dataTransfer.files); });
      document.addEventListener('paste', function(e) {
        var items = e.clipboardData && e.clipboardData.items;
        if (!items) return;
        var files = [];
        for (var i = 0; i < items.length; i++) {
          if (items[i].kind === 'file') { var f = items[i].getAsFile(); if (f) files.push(f); }
        }
        if (files.length > 0) {
          dropZone.classList.add('dragging');
          setTimeout(function() { dropZone.classList.remove('dragging'); }, 600);
          handleFiles(files);
        }
      });

      function handleFiles(files) {
        var arr = Array.prototype.slice.call(files);
        function next(i) { if (i >= arr.length) return; uploadFile(arr[i], function() { next(i + 1); }); }
        next(0);
      }

      function uploadFile(file, callback) {
        progressWrap.style.display = 'block';
        progressBar.style.width = '40%';
        status.textContent = 'Uploading ' + file.name + '...';
        var fileName = Date.now() + '_' + file.name;
        client.storage.from(BUCKET).upload(fileName, file).then(function(result) {
          if (result.error) {
            status.textContent = 'Failed: ' + result.error.message;
            progressWrap.style.display = 'none';
            if (callback) callback();
            return;
          }
          progressBar.style.width = '100%';
          setTimeout(function() {
            progressWrap.style.display = 'none';
            progressBar.style.width = '0%';
            status.textContent = '✓ Uploaded!';
            setTimeout(function() { status.textContent = ''; }, 2000);
            loadFiles();
            if (callback) callback();
          }, 400);
        });
      }

      /* ── File helpers ── */
      function getFileIcon(name) {
        var ext = name.split('.').pop().toLowerCase();
        if (['jpg','jpeg','png','gif','webp','svg'].indexOf(ext) > -1) return '🖼';
        if (ext === 'pdf') return '📄';
        if (['zip','rar','7z','tar','gz'].indexOf(ext) > -1) return '📦';
        if (['mp4','mov','avi','mkv'].indexOf(ext) > -1) return '🎬';
        if (['mp3','wav','flac','aac'].indexOf(ext) > -1) return '🎵';
        if (['doc','docx'].indexOf(ext) > -1) return '📝';
        if (['xls','xlsx','csv'].indexOf(ext) > -1) return '📊';
        if (['txt','md','json','xml','html','css','js','py','ts','yaml','yml'].indexOf(ext) > -1) return '📃';
        return '📁';
      }

      function formatSize(bytes) {
        if (!bytes) return '—';
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(1) + ' MB';
      }

      function isPreviewable(ext) {
        return ['jpg','jpeg','png','gif','webp','svg',
                'pdf',
                'txt','md','json','xml','csv','html','css','js','ts',
                'jsx','tsx','py','rb','php','sh','yaml','yml','log',
                'toml','ini','conf','vue'].indexOf(ext) > -1;
      }

      /* ── Load file list ── */
      function loadFiles() {
        client.storage.from(BUCKET).list('', { sortBy: { column: 'created_at', order: 'desc' } }).then(function(result) {
          fileList.innerHTML = '';
          if (result.error || !result.data) {
            fileList.innerHTML = '<div class="empty">No files uploaded yet</div>';
            fileCount.textContent = '0 files';
            return;
          }

          /* filter out the hidden clipboard file */
          var data = result.data.filter(function(f) { return f.name !== CLIPBOARD_KEY; });

          if (data.length === 0) {
            fileList.innerHTML = '<div class="empty">No files uploaded yet</div>';
            fileCount.textContent = '0 files';
            return;
          }

          fileCount.textContent = data.length + (data.length === 1 ? ' file' : ' files');

          data.forEach(function(file) {
            var displayName = file.name.replace(/^\d+_/, '');
            var ext = displayName.split('.').pop().toLowerCase();
            var canPreview = isPreviewable(ext);

            var item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML =
              '<span class="file-icon">' + getFileIcon(file.name) + '</span>' +
              '<div class="file-info">' +
                '<div class="file-name">' + displayName + '</div>' +
                '<div class="file-meta">' + formatSize(file.metadata && file.metadata.size) + '</div>' +
              '</div>' +
              '<div class="file-actions">' +
                (canPreview ? '<button class="btn-action btn-preview">Preview</button>' : '') +
                '<button class="btn-action btn-copy">Copy Link</button>' +
                '<button class="btn-action btn-dl">Download</button>' +
                '<button class="btn-action btn-share">Share</button>' +
                '<button class="btn-action btn-del">Delete</button>' +
              '</div>';

            if (canPreview) {
              item.querySelector('.btn-preview').addEventListener('click', function() {
                previewFile(file.name, displayName);
              });
            }
            item.querySelector('.btn-copy').addEventListener('click', function() {
              copyFileLink(file.name, displayName, item.querySelector('.btn-copy'));
            });
            item.querySelector('.btn-dl').addEventListener('click', function() { downloadFile(file.name, displayName); });
            item.querySelector('.btn-share').addEventListener('click', function() { shareFile(file.name, displayName, item.querySelector('.btn-share')); });
            item.querySelector('.btn-del').addEventListener('click', function() { deleteFile(file.name, item); });
            fileList.appendChild(item);
          });
        });
      }

      /* ── Download ── */
      function downloadFile(fileName, displayName) {
        client.storage.from(BUCKET).download(fileName).then(function(result) {
          if (result.error) { alert('Download failed'); return; }
          var url = URL.createObjectURL(result.data);
          var a = document.createElement('a');
          a.href = url; a.download = displayName; a.click();
          URL.revokeObjectURL(url);
        });
      }

      /* ── Share ── */
      function shareFile(fileName, displayName, btn) {
        if (!navigator.share) { alert('Sharing is not supported on this browser.'); return; }
        btn.disabled = true; btn.textContent = '...';
        client.storage.from(BUCKET).download(fileName).then(function(result) {
          if (result.error) { alert('Share failed'); btn.disabled = false; btn.textContent = 'Share'; return; }
          var file = new File([result.data], displayName, { type: result.data.type || 'application/octet-stream' });
          navigator.share({ files: [file], title: displayName })
            .catch(function() {})
            .finally(function() { btn.disabled = false; btn.textContent = 'Share'; });
        });
      }

      /* ── Delete ── */
      function deleteFile(fileName, item) {
        item.style.opacity = '0'; item.style.transition = 'opacity 0.3s';
        client.storage.from(BUCKET).remove([fileName]).then(function(result) {
          if (result.error) { item.style.opacity = '1'; alert('Delete failed'); return; }
          setTimeout(function() { item.remove(); loadFiles(); }, 300);
        });
      }

      /* ── NEW: Copy Link (7-day signed URL) ── */
      function copyFileLink(fileName, displayName, btn) {
        var orig = btn.textContent;
        btn.textContent = '...';
        client.storage.from(BUCKET).createSignedUrl(fileName, 604800).then(function(result) {
          if (result.error || !result.data) {
            btn.textContent = 'Error';
            setTimeout(function() { btn.textContent = orig; }, 1500);
            return;
          }
          var link = result.data.signedUrl;
          function onCopied() {
            btn.textContent = '✓ Copied!';
            btn.classList.add('copied');
            setTimeout(function() { btn.textContent = orig; btn.classList.remove('copied'); }, 2200);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(link).then(onCopied).catch(function() { fallbackCopy(link); onCopied(); });
          } else {
            fallbackCopy(link); onCopied();
          }
        });
      }

      function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        try { document.execCommand('copy'); } catch(e) {}
        document.body.removeChild(ta);
      }

      /* ── NEW: Preview modal ── */
      function previewFile(fileName, displayName) {
        var ext = displayName.split('.').pop().toLowerCase();
        previewTitle.textContent = displayName;
        previewIcon.textContent = getFileIcon(fileName);
        previewBody.innerHTML = '<div class="preview-loading">Loading preview…</div>';
        previewOverlay.classList.add('open');

        var isImage = ['jpg','jpeg','png','gif','webp','svg'].indexOf(ext) > -1;
        var isPdf   = ext === 'pdf';
        var isText  = ['txt','md','json','xml','csv','html','css','js','ts','jsx','tsx',
                       'py','rb','php','sh','yaml','yml','log','toml','ini','conf','vue'].indexOf(ext) > -1;

        if (!isImage && !isPdf && !isText) {
          previewBody.innerHTML =
            '<div class="no-preview">' +
              '<span class="big-icon">' + getFileIcon(fileName) + '</span>' +
              'No preview available for .' + ext + ' files<br><br>' +
              '<span style="font-size:0.6rem;opacity:0.5;">Use Download to open this file</span>' +
            '</div>';
          return;
        }

        client.storage.from(BUCKET).download(fileName).then(function(result) {
          if (result.error) {
            previewBody.innerHTML = '<div class="no-preview"><span class="big-icon">⚠</span>Preview failed</div>';
            return;
          }
          var blob = result.data;
          var url  = URL.createObjectURL(blob);

          previewBody.innerHTML = '';

          if (isImage) {
            var img = document.createElement('img');
            img.src = url;
            img.alt = displayName;
            img.onload = function() { URL.revokeObjectURL(url); };
            previewBody.appendChild(img);

          } else if (isPdf) {
            var iframe = document.createElement('iframe');
            iframe.src = url;
            previewBody.appendChild(iframe);
            /* don't revoke — iframe still needs it */

          } else if (isText) {
            blob.text().then(function(txt) {
              URL.revokeObjectURL(url);
              var pre = document.createElement('pre');
              var MAX = 8000;
              pre.textContent = txt.length > MAX
                ? txt.substring(0, MAX) + '\n\n… (preview truncated — download for full file)'
                : txt;
              previewBody.appendChild(pre);
            });
          }
        });
      }

      function closePreview() {
        previewOverlay.classList.remove('open');
        /* small delay so the closing animation isn't jarring */
        setTimeout(function() { previewBody.innerHTML = ''; }, 200);
      }

      previewClose.addEventListener('click', closePreview);
      previewOverlay.addEventListener('click', function(e) { if (e.target === previewOverlay) closePreview(); });
      document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePreview(); });

      /* ── NEW: Shared Clipboard ── */
      var clipSaveTimeout = null;

      function loadClipboard() {
        client.storage.from(BUCKET).download(CLIPBOARD_KEY).then(function(result) {
          if (result.error) return; /* no clipboard file yet — that's fine */
          result.data.text().then(function(txt) {
            /* only update if user isn't actively typing */
            if (document.activeElement !== clipboardArea) {
              clipboardArea.value = txt;
            }
          });
        });
      }

      function saveClipboard(silent) {
        var txt = clipboardArea.value;
        if (!silent) { clipboardStatus.textContent = 'Saving…'; }
        var blob = new Blob([txt], { type: 'text/plain' });
        client.storage.from(BUCKET).upload(CLIPBOARD_KEY, blob, { upsert: true }).then(function(result) {
          if (result.error) {
            clipboardStatus.textContent = 'Save failed';
          } else {
            clipboardStatus.textContent = '✓ Saved';
          }
          setTimeout(function() { clipboardStatus.textContent = ''; }, 2000);
        });
      }

      /* auto-save 2 seconds after user stops typing */
      clipboardArea.addEventListener('input', function() {
        if (clipSaveTimeout) clearTimeout(clipSaveTimeout);
        clipboardStatus.textContent = 'Unsaved…';
        clipSaveTimeout = setTimeout(function() { saveClipboard(false); }, 2000);
      });

      clipSaveBtn.addEventListener('click', function() {
        if (clipSaveTimeout) { clearTimeout(clipSaveTimeout); clipSaveTimeout = null; }
        saveClipboard(false);
      });

      clipCopyBtn.addEventListener('click', function() {
        var txt = clipboardArea.value;
        if (!txt.trim()) { clipboardStatus.textContent = 'Nothing to copy'; setTimeout(function() { clipboardStatus.textContent = ''; }, 1500); return; }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(txt).then(function() {
            clipboardStatus.textContent = '✓ Copied to clipboard';
            setTimeout(function() { clipboardStatus.textContent = ''; }, 2000);
          });
        } else {
          clipboardArea.select();
          document.execCommand('copy');
          clipboardStatus.textContent = '✓ Copied';
          setTimeout(function() { clipboardStatus.textContent = ''; }, 2000);
        }
      });

      clipClearBtn.addEventListener('click', function() {
        if (!clipboardArea.value.trim()) return;
        if (confirm('Clear the shared clipboard? This will clear it for everyone.')) {
          clipboardArea.value = '';
          saveClipboard(false);
        }
      });

      /* ── Initial load & polling ── */
      loadFiles();
      loadClipboard();
      setInterval(function() { loadFiles(); loadClipboard(); }, 10000);

    });
  </script>
</body>
</html>
